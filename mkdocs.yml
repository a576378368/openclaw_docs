site_name: OpenClaw Architecture Book
site_description: OpenClaw 系统架构文档 - 深入理解设计理念、架构模式和实现细节
site_author: OpenClaw Team
site_url: https://a576378368.github.io/openclaw_docs

repo_name: openclaw/openclaw_docs
repo_url: https://github.com/openclaw/openclaw_docs

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - announce.dismiss

plugins:
  - search:
      lang:
        - en
        - zh

