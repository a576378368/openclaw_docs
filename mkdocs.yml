markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - meta

extra_css:
  - stylesheets/extra.css